<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Crusher</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*,
*::before,
*::after {
box-sizing: border-box;
margin: 0;
padding: 0;
}

:root {

--black:#0a0a0a;
--teal:#00C9B1;
--cobalt:#2563EB;
--pink:#EC4899;
--lime:#84CC16;
--orange:#F97316;
--purple:#8B5CF6;
--yellow:#FBBF24;
--red:#EF4444;
--cyan:#22D3EE;

--white:#ffffff;

--gold:#B8860B;
--gold-light:#DAA520;
--gold-bright:#FFD700;

--cream:#FDF8EE;

--brown:#6B4C2A;
--brown-light:#8B6340;

}

body{

min-height:100vh;
font-family:'DM Sans',sans-serif;

background:var(--black);

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

padding:2rem 1rem;

position:relative;

overflow-x:hidden;

}

/* confetti */

#confettiCanvas{
position:fixed;
inset:0;
pointer-events:none;
z-index:100;
}

/* pebbles background */

.pebbles-bg{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
overflow:hidden;
}

.pebble{

position:absolute;

border-radius:60% 40% 55% 45% / 50% 60% 40% 50%;

animation:pebbleDrift ease-in-out infinite alternate;

}

.pebble::after{

content:'';

position:absolute;

top:18%;
left:22%;

width:28%;
height:18%;

background:rgba(255,255,255,0.5);

border-radius:50%;

transform:rotate(-30deg);

}

@keyframes pebbleDrift{

from{
transform:translateY(0) rotate(0deg) scale(1);
}

to{
transform:translateY(-18px) rotate(7deg) scale(1.04);
}

}

/* screens */

.screen{
display:none;
position:relative;
z-index:1;
width:100%;
max-width:480px;
flex-direction:column;
align-items:center;
gap:1rem;
}

.screen.active{
display:flex;
}

.card{

background:rgba(15,15,15,0.88);

backdrop-filter:blur(20px);

border:1.5px solid rgba(255,255,255,0.07);

border-radius:32px;

padding:2.8rem 2.4rem 2.4rem;

width:100%;

box-shadow:
0 20px 60px rgba(0,0,0,0.6),
0 0 80px rgba(0,201,177,0.07);

}

/* heading */

h1{

font-family:'Cormorant Garamond',serif;

font-size:3.2rem;

font-weight:700;

letter-spacing:-0.02em;

line-height:1;

color:var(--white);

margin-bottom:0.4rem;

}

h1 span{

background:linear-gradient(
90deg,
var(--teal),
var(--cyan),
var(--lime)
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

background-clip:text;

}

/* inputs */

input,
textarea{

width:100%;

padding:0.85rem 1.1rem;

border:1.5px solid rgba(255,255,255,0.09);

border-radius:14px;

font-family:'DM Sans',sans-serif;

font-size:0.95rem;

color:var(--white);

background:rgba(255,255,255,0.05);

outline:none;

}

input::placeholder,
textarea::placeholder{

color:rgba(255,255,255,0.18);

}

/* primary button */

.btn-primary{

width:100%;

padding:1rem;

border:none;

border-radius:16px;

background:linear-gradient(
135deg,
var(--teal),
var(--cyan),
var(--lime)
);

color:var(--black);

font-size:1rem;

font-weight:600;

cursor:pointer;

box-shadow:
0 6px 24px rgba(0,201,177,0.4);

}

</style>
</head>

<body>

<canvas id="confettiCanvas"></canvas>

<div class="pebbles-bg" id="pebblesContainer"></div>

<div class="screen active">

<div class="card">

<h1>Book <span>Crusher</span></h1>

<p style="color:rgba(255,255,255,0.35)">
Finally finish every book you start
</p>

<br>

<input placeholder="Book title">

<br><br>

<input placeholder="Total pages">

<br><br>

<button class="btn-primary">
Crush This Book 🚀
</button>

</div>

</div>

</body>
</html>
